<!DOCTYPE html>
<html>
<head>

  <link

  >
  
  <style>
    body{
      font-family:Arial;
      max-width:500px;
      margin:60px auto;
      padding:20px;

    form{

    }

    input,
    button{
      padding:12px;
    }

    .top{
      margin-bottom:20px;
    }

    a{
      text-decoration:none;
    }

<body>

<div class="top">
  <a href="./dashboard.html">

<h1>Change Password</h1>

<form id="changePasswordForm">

<input
type="password"
id="newPassword"
placeholder="New Password"
required
>

<button>
Update Password
</button>

</form>

<p id="message"></p>

<script type="module" src="./scripts/change-password.js"></script>

</body>
</html>
