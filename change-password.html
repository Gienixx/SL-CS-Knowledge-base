<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Change Password | SocialLoop CS Base</title>

  <link
    rel="stylesheet"
    href="./styles/button-theme.css?v=1"
  >

  <style>
    :root {
      --sl-navy: #241b5d;
      --sl-cream: #fbf8f1;
      --sl-cream-soft: #f4eee1;
      --sl-gold: #ffc21a;
      --sl-text: #2b2459;
      --sl-muted: #6f678f;
      --sl-border: rgba(36, 27, 93, 0.10);
      --sl-shadow: 0 28px 80px rgba(36, 27, 93, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Poppins", Arial, sans-serif;
      color: var(--sl-text);
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 194, 26, 0.24), transparent 22rem),
        radial-gradient(circle at 86% 12%, rgba(36, 27, 93, 0.12), transparent 24rem),
        linear-gradient(180deg, var(--sl-cream), var(--sl-cream-soft));
    }

    .password-card {
      width: min(100%, 520px);
      padding: 32px;
      border: 1px solid var(--sl-border);
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,246,238,0.98));
      box-shadow: var(--sl-shadow);
    }

    .back-link {
      display: inline-flex;
      margin-bottom: 20px;
      color: var(--sl-navy);
      text-decoration: none;
      font-weight: 700;
    }

    .back-link[hidden] {
      display: none;
    }

    .first-login-notice {
      margin-bottom: 20px;
      padding: 14px 16px;
      border: 1px solid rgba(255, 194, 26, 0.42);
      border-radius: 14px;
      background: rgba(255, 194, 26, 0.12);
      color: var(--sl-navy);
      font-weight: 700;
      line-height: 1.5;
    }

    .first-login-notice[hidden] {
      display: none;
    }

    h1 {
      margin: 0 0 10px;
      color: var(--sl-navy);
      font-size: clamp(2rem, 5vw, 2.7rem);
    }

    .description {
      margin: 0 0 24px;
      color: var(--sl-muted);
      line-height: 1.65;
    }

    form {
      display: grid;
      gap: 16px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--sl-text);
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--sl-border);
      border-radius: 14px;
      background: rgba(255,255,255,0.96);
      color: var(--sl-text);
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: rgba(255, 194, 26, 0.72);
      box-shadow: 0 0 0 4px rgba(255, 194, 26, 0.14);
    }

    button {
      min-height: 46px;
      padding: 0 18px;
      border: 1px solid rgba(255, 194, 26, 0.55);
      border-radius: 999px;
      background: var(--sl-navy);
      color: #fff;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      min-height: 1.4em;
      margin: 16px 0 0;
      color: var(--sl-muted);
      font-weight: 600;
      line-height: 1.5;
    }

    .message.error {
      color: #9f2525;
    }

    .message.success {
      color: #176b3a;
    }

    @media (max-width: 560px) {
      body {
        padding: 16px;
      }

      .password-card {
        padding: 24px 20px;
      }
    }
  </style>
</head>

<body>
  <main class="password-card">
    <a
      class="back-link"
      id="backToDashboard"
      href="./dashboard.html"
    >
      ← Back to Dashboard
    </a>

    <div
      class="first-login-notice"
      id="firstLoginNotice"
      hidden
    >
      This is your first login. You must replace your temporary password before continuing.
    </div>

    <h1 id="pageTitle">Change Password</h1>

    <p
      class="description"
      id="pageDescription"
    >
      Enter a new password for your account.
    </p>

    <form id="changePasswordForm">
      <label for="newPassword">
        New password
        <input
          type="password"
          id="newPassword"
          name="newPassword"
          placeholder="At least 8 characters"
          autocomplete="new-password"
          minlength="8"
          required
        >
      </label>

      <label for="confirmPassword">
        Confirm new password
        <input
          type="password"
          id="confirmPassword"
          name="confirmPassword"
          placeholder="Re-enter your new password"
          autocomplete="new-password"
          minlength="8"
          required
        >
      </label>

      <button
        id="updatePasswordButton"
        type="submit"
      >
        Update Password
      </button>
    </form>

    <p
      id="message"
      class="message"
      aria-live="polite"
    ></p>
  </main>

  <script
    type="module"
    src="./scripts/change-password.js?v=1"
  ></script>

  <script
    type="module"
    src="./scripts/first-login-password.js?v=1"
  ></script>
</body>
</html>
