<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge base</title>
<link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2340; --ink-soft:#2B3560;
    --paper:#F7F5EF; --card:#FFFFFF; --line:#E7E3D8;
    --amber:#C9812E; --amber-bg:#FBEDDA; --amber-strong:#E2A83D;
    --teal:#2E7D6B; --teal-bg:#E4F1EC;
    --coral:#B5432F; --coral-bg:#FBEAE5;
    --violet:#4C4A9E; --violet-bg:#EAEAF7;
    --text-1:#1B2340; --text-2:#6B7280; --text-3:#9A9788;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--text-1);font-family:'Inter',sans-serif;}
  .wrap{max-width:1120px;margin:0 auto;padding:0 32px 60px;}
  header{display:flex;justify-content:space-between;align-items:center;padding:26px 0 0;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:32px;height:32px;border-radius:9px;background:var(--amber-strong);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--ink);font-family:'Space Grotesk',sans-serif;font-size:15px;}
  .brand-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;}
  .back-btn{font-size:13px;font-weight:600;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:9px 16px;border-radius:100px;cursor:pointer;text-decoration:none;}
  .back-btn:hover{border-color:var(--ink);}
  .hero{text-align:center;padding:44px 0 30px;}
  .hero h1{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;margin:0 0 8px;letter-spacing:-0.5px;}
  .hero p{font-size:14.5px;color:var(--text-2);margin:0;}
  .utility{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:36px;}
  .search-box{flex:1;min-width:220px;position:relative;}
  .search-box input{width:100%;font-family:'Inter',sans-serif;font-size:14px;padding:11px 14px 11px 38px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--text-1);}
  .search-box input:focus{outline:none;border-color:var(--ink);}
  .search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:14px;}
  .filters{display:flex;gap:6px;flex-wrap:wrap;}
  .filter-chip{font:600 13px 'Inter',sans-serif;padding:9px 15px;border-radius:100px;border:1px solid var(--line);background:var(--card);color:var(--text-2);cursor:pointer;white-space:nowrap;}
  .filter-chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}
  .filter-chip:hover:not(.on){border-color:var(--ink);color:var(--ink);}
  .section-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:16px;gap:16px;}
  .section-title{font-family:'Space Grotesk',sans-serif;font-size:19px;font-weight:600;margin:0;}
  .section-count{font-size:13px;color:var(--text-3);}
  .articles{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:44px;}
  .art-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px 20px 18px;display:flex;flex-direction:column;color:inherit;text-decoration:none;transition:transform .18s,border-color .18s;}
  .art-card:hover{transform:translateY(-2px);border-color:var(--ink);}
  .art-tag{align-self:flex-start;font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px;margin-bottom:12px;}
  .art-tag.tickets{background:var(--violet-bg);color:var(--violet);}
  .art-tag.cashouts{background:var(--teal-bg);color:var(--teal);}
  .art-title{font-size:14.5px;font-weight:600;line-height:1.4;margin:0 0 8px;}
  .art-desc{font-size:12.5px;color:var(--text-2);line-height:1.55;margin:0;flex:1;}
  .art-meta{font-size:11.5px;color:var(--text-3);margin:14px 0 0;padding-top:12px;border-top:1px solid var(--line);}
  .art-meta b{color:var(--text-2);font-weight:600;}
  .watch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .watch-card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;color:inherit;text-decoration:none;transition:transform .18s,border-color .18s;}
  .watch-card:hover{transform:translateY(-2px);border-color:var(--ink);}
  .thumb{height:110px;display:flex;align-items:center;justify-content:center;position:relative;}
  .thumb .play{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;}
  .thumb .play::after{content:"";border-left:11px solid var(--ink);border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:3px;}
  .watch-label{padding:12px 14px 14px;}
  .watch-title{font-size:13px;font-weight:600;margin:0 0 3px;}
  .watch-sub{font-size:11.5px;color:var(--text-3);margin:0;}
  .empty-state,.load-error{grid-column:1/-1;text-align:center;color:var(--text-2);padding:28px;background:var(--card);border:1px solid var(--line);border-radius:16px;}
  .load-error{color:var(--coral);}
  [hidden]{display:none!important;}
  @media (max-width:950px){.articles,.watch-grid{grid-template-columns:repeat(2,1fr);}}
  @media (max-width:560px){.wrap{padding:0 18px 40px}.hero{padding:36px 0 26px}.hero h1{font-size:27px}.utility{align-items:stretch}.search-box{flex-basis:100%}.filters{display:grid;grid-template-columns:repeat(2,1fr)}.filter-chip{width:100%}.articles,.watch-grid{grid-template-columns:1fr}.section-head{align-items:flex-start;flex-direction:column;gap:4px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><div class="brand-mark">S</div><div class="brand-name">Knowledge base</div></div>
    <a href="./home.html" class="back-btn">Back to home</a>
  </header>
  <div class="hero">
    <h1>Everything the team needs to know</h1>
    <p>Search articles, scripts, and walkthroughs in one place.</p>
  </div>
  <div class="utility">
    <div class="search-box"><span class="search-icon" aria-hidden="true">⌕</span><input id="searchInput" type="search" placeholder="Search articles, scripts, or topics…" autocomplete="off" aria-label="Search knowledge base"></div>
    <div class="filters" aria-label="Article categories">
      <button class="filter-chip on" type="button" data-category="ALL">All</button>
      <button class="filter-chip" type="button" data-category="TICKETS">Tickets</button>
      <button class="filter-chip" type="button" data-category="CASHOUTS">Cashouts</button>
      <button class="filter-chip" type="button" data-category="LINKS">Links</button>
    </div>
  </div>
  <div class="section-head" id="articleHeading"><p class="section-title">All published articles</p><span class="section-count" id="articleCount">Loading articles…</span></div>
  <div class="articles" id="articles" aria-live="polite"></div>
  <section id="watchSection">
    <div class="section-head"><p class="section-title">Watch &amp; learn</p><span class="section-count">Linked from the Links category</span></div>
    <div class="watch-grid" id="watchGrid"></div>
  </section>
</div>
<script type="module" src="./scripts/kb.js?v=5"></script>
<script type="module" src="./scripts/auth-guard.js"></script>
</body>
</html>
