<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SocialLoop — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #f6f8f2;
      --ink: #1e2233;
      --ink-soft: #454b5e;
      --slate: #6b7280;
      --coral: #ff6b4a;
      --gold: #e7a800;
      --sage: #e8eedd;
      --sage-deep: #d7e3c6;
      --line: rgba(30, 34, 51, 0.1);
      --radius-lg: 22px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 56px 24px;
      color: var(--ink);
      background:
        radial-gradient(1100px 600px at 8% -10%, #fdefc9 0%, rgba(253, 239, 201, 0) 55%),
        radial-gradient(900px 600px at 100% 0%, #e3e7f0 0%, rgba(227, 231, 240, 0) 55%),
        var(--paper);
      font-family: "Manrope", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: min(980px, 100%);
      gap: 22px;
    }

    .panel {
      padding: 44px 40px;
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 24px 50px -30px rgba(30, 34, 51, 0.25);
      backdrop-filter: blur(6px);
    }

    .left {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 560px;
    }

    .wordmark {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-family: "Fraunces", serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-decoration: none;
      text-transform: uppercase;
    }

    .mark {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    .left-mid { margin: auto 0 0; }

    .left h1 {
      margin: 0 0 18px;
      font-family: "Fraunces", serif;
      font-size: clamp(38px, 5vw, 46px);
      font-weight: 500;
      line-height: 1.05;
      letter-spacing: -0.015em;
    }

    .left h1 em {
      color: var(--coral);
      font-style: italic;
    }

    .left p {
      max-width: 360px;
      margin: 0 0 26px;
      color: var(--ink-soft);
      font-size: 15.5px;
      line-height: 1.6;
    }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
    }

    .pill {
      padding: 8px 14px;
      border: 1px solid var(--sage-deep);
      border-radius: 999px;
      color: #4e6339;
      background: var(--sage);
      font-size: 12.5px;
      font-weight: 700;
    }

    .right h2 {
      margin: 0 0 8px;
      font-family: "Fraunces", serif;
      font-size: 30px;
      font-weight: 500;
    }

    .sub {
      margin: 0 0 28px;
      color: var(--slate);
      font-size: 14.5px;
    }

    form { display: block; }

    .field { margin-bottom: 20px; }

    label {
      display: block;
      margin: 0 0 8px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 15px;
      border: 1px solid var(--line);
      border-radius: 12px;
      outline: none;
      color: var(--ink);
      background: #fff;
      font: 14.5px "Manrope", sans-serif;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    input::placeholder { color: #a6abb8; }

    input:focus {
      border-color: var(--coral);
      box-shadow: 0 0 0 3px rgba(255, 107, 74, 0.14);
    }

    .row-between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 2px 0 26px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 0;
      color: var(--ink-soft);
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
    }

    .remember input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--coral);
    }

    .need-help {
      color: var(--coral);
      font-size: 13.5px;
      font-weight: 700;
      text-decoration: none;
    }

    .need-help:hover { text-decoration: underline; }

    .btn-primary,
    .btn-outline {
      width: 100%;
      display: block;
      border-radius: 999px;
      font-family: "Manrope", sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .btn-primary {
      margin: 0 0 12px;
      padding: 15px 20px;
      border: 0;
      color: #fff;
      background: var(--ink);
      font-size: 15px;
    }

    .btn-primary:hover:not(:disabled) {
      background: #33384f;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .btn-outline {
      padding: 13.5px 20px;
      border: 1.5px solid var(--line);
      color: var(--ink);
      background: #fff;
      font-size: 14.5px;
      text-align: center;
      text-decoration: none;
    }

    .btn-outline:hover {
      border-color: var(--ink);
      background: #fafaf8;
    }

    .status {
      min-height: 1.4em;
      margin: 16px 0 0;
      color: var(--slate);
      font-size: 13px;
      line-height: 1.5;
      text-align: center;
    }

    .status.error { color: #b33d2c; }
    .status.success { color: #4e6339; }

    .foot-note {
      margin: 8px 0 0;
      color: var(--slate);
      font-size: 12.5px;
      line-height: 1.55;
      text-align: center;
    }

    @media (max-width: 820px) {
      body { padding: 28px 18px; }
      .shell { grid-template-columns: 1fr; }
      .left { min-height: 360px; }
    }

    @media (max-width: 520px) {
      body { padding: 14px 10px; }
      .panel { padding: 30px 24px; }
      .left { min-height: 330px; }
      .row-between { align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="shell" aria-labelledby="login-title">
    <section class="panel left">
      <a class="wordmark" href="index-modular.html" aria-label="SocialLoop CS Base home">
        <svg class="mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 3.5C7 3.5 3.5 6.6 3.5 12S7 20.5 12 20.5 20.5 17.4 20.5 12" stroke="#FF6B4A" stroke-width="2.6" stroke-linecap="round"/>
          <path d="M20.5 12c0-5.4-3.5-8.5-8.5-8.5" stroke="#E7A800" stroke-width="2.6" stroke-linecap="round" stroke-dasharray="0.5 6"/>
        </svg>
        SocialLoop CS Base
      </a>

      <div class="left-mid">
        <h1 id="login-title">Welcome<br><em>back.</em></h1>
        <p>Sign in to reach the knowledge base, support pages, and internal resources.</p>
        <div class="pills" aria-label="Login highlights">
          <span class="pill">Secure access</span>
          <span class="pill">Team resources</span>
          <span class="pill">Fast entry</span>
        </div>
      </div>
    </section>

    <section class="panel right" aria-labelledby="form-title">
      <h2 id="form-title">Log in</h2>
      <p class="sub">Use your team credentials to continue.</p>

      <form id="loginForm" action="#" method="post">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Your password" autocomplete="current-password" required>
        </div>

        <div class="row-between">
          <label class="remember" for="remember">
            <input id="remember" name="remember" type="checkbox">
            Remember me
          </label>
          <a href="contact.html" class="need-help">Need help?</a>
        </div>

        <button class="btn-primary" type="submit">Sign in</button>
        <a href="index-modular.html" class="btn-outline">Back to home</a>
      </form>

      <p class="status" id="loginStatus" aria-live="polite"></p>
      <p class="foot-note">Secure access for SocialLoop team members.</p>
    </section>
  </main>

  <script type="module" src="./scripts/login.js?v=1"></script>
</body>
</html>
