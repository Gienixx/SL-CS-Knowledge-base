<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Article | SocialLoop CS Base</title>
  <link rel="stylesheet" href="styles.css?v=modal-details-3">

  <style>
    .article-page {
      min-height: 100vh;
      padding: 40px 10%;
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 194, 26, 0.20), transparent 22rem),
        radial-gradient(circle at 86% 12%, rgba(36, 27, 93, 0.10), transparent 24rem),
        linear-gradient(180deg, var(--sl-cream) 0%, #fffdfa 48%, var(--sl-cream-soft) 100%);
    }

    .article-shell {
      max-width: 920px;
      margin: 0 auto;
    }

    .article-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .article-title h1 {
      color: var(--sl-navy);
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 8px;
    }

    .article-title p {
      color: var(--sl-muted);
      line-height: 1.6;
    }

    .article-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(250,246,238,0.98));
      border: 1px solid var(--sl-border);
      border-radius: 22px;
      box-shadow: var(--sl-shadow);
      padding: 28px;
    }

    .article-form {
      display: grid;
      gap: 14px;
    }

    .article-form input,
    .article-form textarea {
      width: 100%;
      border: 1px solid var(--sl-border);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      color: var(--sl-text);
      background: rgba(255,255,255,0.9);
      outline: none;
    }

    .article-form textarea {
      min-height: 260px;
      resize: vertical;
      line-height: 1.7;
    }

    .article-form input:focus,
    .article-form textarea:focus {
      border-color: rgba(255, 194, 26, 0.7);
      box-shadow: 0 0 0 4px rgba(255, 194, 26, 0.14);
    }

    .article-btn,
    .article-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 194, 26, 0.55);
      background: var(--sl-navy);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }

    .article-link {
      background: rgba(255,255,255,0.88);
      color: var(--sl-navy);
    }

    .article-status {
      margin-top: 12px;
      color: var(--sl-muted);
      font-weight: 600;
    }
  </style>
</head>

<body>
  <main class="article-page">
    <div class="article-shell">
      <div class="article-topbar">
        <div class="article-title">
          <h1>Add Article</h1>
          <p>Create a new knowledge base article for the SocialLoop CS Base.</p>
        </div>

        <a class="article-link" href="./dashboard.html">← Back to Dashboard</a>
      </div>

      <section class="article-card">
        <form id="articleForm" class="article-form">
          <input id="title" type="text" placeholder="Article title" required>
          <textarea id="content" placeholder="Article content" required></textarea>
          <button class="article-btn" type="submit">Save Article</button>
        </form>

        <p id="message" class="article-status"></p>
      </section>
    </div>
  </main>

  <script type="module" src="./scripts/add-article.js?v=1"></script>
</body>
</html>
