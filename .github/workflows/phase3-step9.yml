name: Phase 3 Step 9 Google Sheet Reporting Contract

on:
  pull_request:
    paths:
      - 'config/phase3-step9-sheet-contract.js'
      - 'functions/_shared/dashboard-sync-contract-v3.js'
      - 'functions/api/sync-dashboard-v3.js'
      - 'apps-script/phase3-step9-reporting-contract.gs'
      - 'supabase/migrations/2026070301_phase3_step9_google_sheet_reporting_contract.sql'
      - 'supabase/verification/phase3_step9_google_sheet_contract_check.sql'
      - 'docs/phase-3-step-9-google-sheet-reporting-contract.md'
      - 'tests/phase3-step9-reporting-contract.test.mjs'
      - 'package.json'
      - '.github/workflows/phase3-step9.yml'
  push:
    branches: [main]
    paths:
      - 'config/phase3-step9-sheet-contract.js'
      - 'functions/_shared/dashboard-sync-contract-v3.js'
      - 'functions/api/sync-dashboard-v3.js'
      - 'apps-script/phase3-step9-reporting-contract.gs'
      - 'supabase/migrations/2026070301_phase3_step9_google_sheet_reporting_contract.sql'
      - 'supabase/verification/phase3_step9_google_sheet_contract_check.sql'
      - 'docs/phase-3-step-9-google-sheet-reporting-contract.md'
      - 'tests/phase3-step9-reporting-contract.test.mjs'
      - 'package.json'
      - '.github/workflows/phase3-step9.yml'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --experimental-default-type=module --check config/phase3-step9-sheet-contract.js
      - run: node --experimental-default-type=module --check functions/_shared/dashboard-sync-contract-v3.js
      - run: node --experimental-default-type=module --check functions/api/sync-dashboard-v3.js
      - run: cp apps-script/phase3-step9-reporting-contract.gs /tmp/phase3-step9-reporting-contract.js
      - run: node --check /tmp/phase3-step9-reporting-contract.js
      - run: npm run test:phase3-step9
