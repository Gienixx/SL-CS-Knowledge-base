name: Export timezone branch

on:
  pull_request:
  push:
    branches: [workforce-timezone-new-york]

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: workforce-timezone-branch
          path: .
          include-hidden-files: true
          retention-days: 1
