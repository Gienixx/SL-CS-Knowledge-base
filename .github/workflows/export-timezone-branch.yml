name: Apply workforce timezone

on:
  push:
    branches: [workforce-timezone-new-york]

permissions:
  contents: write

jobs:
  apply:
    if: contains(github.event.head_commit.message, 'Add temporary timezone application script')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: workforce-timezone-new-york
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply timezone changes
        run: python tools/apply-workforce-timezone.py
      - name: Run targeted tests
        run: |
          node --experimental-default-type=module --test tests/workforce-timezone.test.mjs tests/agent-attendance-interface.test.mjs
          npm run test:site
          npm run test:reporting
          npm run test:repository
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find scripts functions config -type f -name '*.js' -print0)
      - name: Commit verified timezone changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Change workforce timezone to America/New_York"
          git push origin HEAD:workforce-timezone-new-york
