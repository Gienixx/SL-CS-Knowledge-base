name: Workforce Step 6 Tests

on:
  push:
    branches:
      - workforce-step-6-permission-tests
  pull_request:
    paths:
      - "package.json"
      - "tests/**"
      - "shared/**"
      - "functions/**"
      - "scripts/**"
      - "supabase/**"
      - ".github/workflows/workforce-step6-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  permission-tests:
    name: Permission matrix and regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run Workforce Step 6 permission tests
        run: npm run test:workforce-permissions

      - name: Run complete regression suite
        run: npm test
