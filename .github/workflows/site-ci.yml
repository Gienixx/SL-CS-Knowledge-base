name: Site CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Test access and content
        run: npm run test:site
      - name: Test reporting system
        run: npm run test:reporting
      - name: Test repository integrity
        run: npm run test:repository
      - name: Check JavaScript syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            node --check "$file"
          done < <(find scripts functions config -type f -name '*.js' -print0)
