name: Phase 3 Step 4

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ticket-dimensions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run Step 4 tests
        run: npm run test:phase3-step4
      - name: Run Zendesk integration tests
        run: npm run test:zendesk-integration
