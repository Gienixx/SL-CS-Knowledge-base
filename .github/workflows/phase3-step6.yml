name: Phase 3 Step 6 Archived View Guard

on:
  push:
    branches: [main]
    paths:
      - 'response-times.html'
      - 'functions/api/sync-zendesk-sla.js'
      - 'workers/zendesk-health/index.js'
      - 'tests/phase3-step8-google-sheet-cutover.test.mjs'
      - 'package.json'
      - '.github/workflows/phase3-step6.yml'
  pull_request:
    paths:
      - 'response-times.html'
      - 'functions/api/sync-zendesk-sla.js'
      - 'workers/zendesk-health/index.js'
      - 'tests/phase3-step8-google-sheet-cutover.test.mjs'
      - 'package.json'
      - '.github/workflows/phase3-step6.yml'

permissions:
  contents: read

jobs:
  cutover-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run test:phase3-step8
