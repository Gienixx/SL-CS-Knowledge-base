name: Phase 3 Step 2

on:
  push:
    branches:
      - main
    paths:
      - functions/api/sync-zendesk*.js
      - functions/_shared/zendesk-event-normalizer.js
      - functions/_shared/zendesk-incremental-event-normalizer.js
      - functions/_shared/zendesk-sync-store.js
      - supabase/migrations/20260627_phase3_step2_ticket_event_storage.sql
      - supabase/verification/phase3_step2_ticket_event_check.sql
      - tests/phase3-step2-*.test.mjs
      - package.json
      - .github/workflows/phase3-step2.yml
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ticket-events:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Phase 3 Step 2 tests
        run: npm run test:phase3-step2
