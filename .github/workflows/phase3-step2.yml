name: Phase 3 Step 2 Archived Storage Guard

on:
  push:
    branches: [main]
    paths:
      - 'functions/api/sync-zendesk*.js'
      - 'functions/_shared/zendesk-disabled.js'
      - 'supabase/migrations/20260627_phase3_step2_ticket_event_storage.sql'
      - 'tests/phase3-step8-google-sheet-cutover.test.mjs'
      - 'package.json'
      - '.github/workflows/phase3-step2.yml'
  pull_request:
    paths:
      - 'functions/api/sync-zendesk*.js'
      - 'functions/_shared/zendesk-disabled.js'
      - 'supabase/migrations/20260627_phase3_step2_ticket_event_storage.sql'
      - 'tests/phase3-step8-google-sheet-cutover.test.mjs'
      - 'package.json'
      - '.github/workflows/phase3-step2.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cutover-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run test:phase3-step8
