name: Phase 3 Step 5

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  period-comparisons:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run Step 5 tests
        run: npm run test:phase3-step5
      - name: Run Step 4 regression tests
        run: npm run test:phase3-step4
