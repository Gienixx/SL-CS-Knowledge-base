name: Deploy Disabled Zendesk Worker

on:
  push:
    branches:
      - main
    paths:
      - workers/zendesk-health/**
      - functions/api/sync-zendesk.js
      - functions/api/sync-zendesk-events.js
      - functions/api/sync-zendesk-sla.js
      - functions/api/backfill-zendesk-ticket-dimensions.js
      - functions/api/zendesk-test.js
      - functions/_shared/zendesk-disabled.js
      - tests/phase3-step8-google-sheet-cutover.test.mjs
      - .github/workflows/deploy-zendesk-health-worker.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-disabled-zendesk-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Cloudflare deployment secrets
        shell: bash
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          missing=0
          for name in CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_API_TOKEN
          do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub Actions secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Run Google Sheet cutover tests
        run: node --test tests/phase3-step8-google-sheet-cutover.test.mjs

      - name: Deploy disabled Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          workingDirectory: workers/zendesk-health
          command: deploy

      - name: Verify disabled Worker endpoint
        if: ${{ steps.deploy.outputs.deployment-url != '' }}
        shell: bash
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          response="$(curl --fail --silent --show-error "$DEPLOYMENT_URL")"
          echo "$response"
          echo "$response" | grep -F '"enabled":false'
          echo "$response" | grep -F '"reportingSource":"google_sheet"'
          echo "$response" | grep -F 'zendesk_integration_disabled'
