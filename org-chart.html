<html>
<head> 
    <link rel="stylesheet" href="styles.css?v=modal-details-3">
    <style>

 .org-page {
      min-height: 100vh;
      padding: 40px 10%;
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 194, 26, 0.20), transparent 22rem),
        radial-gradient(circle at 86% 12%, rgba(36, 27, 93, 0.10), transparent 24rem),
        linear-gradient(180deg, var(--sl-cream) 0%, #fffdfa 48%, var(--sl-cream-soft) 100%);
    }

    .org-shell {
      max-width: 980px;
      margin: 0 auto;
    }

    .org-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .org-title h1 {
      color: var(--sl-navy);
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 8px;
    }

    .org-title p {
      color: var(--sl-muted);
      line-height: 1.6;
    } 
    
    .org-link { 
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid rgba(255, 194, 26, 0.55);
      background: var(--sl-navy);


      color: #fff;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }
    
</head>
<body>
    <main class="org-page"> 
    <div class="org-shell"> 
      <div class="org-topbar"> 
        <div class="org-title"> 
          <h1>Organizational Chart</h1>  
        </div>

        <a class="org-link" href="./dashboard.html">← Back to Dashboard</a> 
      </div>
        
    <section class="org-chart">
    <h2>Organizational Chart</h2>
    <div class="org-level">
        <div class="org-card">
            <a href="https://www.linkedin.com/in/kirbygee/" target="_blank">
                <img src="assets/Kirby.jfif" alt="Kirby" class="photo-placeholder">
            </a>
            <h3>Kirby</h3>
            <p>Co-owner</p>
        </div>

        <div class="org-card">
            <a href="https://www.linkedin.com/in/tfang17/?skipRedirect=true" target="_blank">
                <img src="assets/tommy.jfif" alt="Tommy" class="photo-placeholder">
            </a>
            <h3>Tommy</h3>
            <p>Co-owner</p>
        </div>
    </div>

    <div class="org-connector"></div>

    <div class="org-level">
        <div class="org-card">
            <img src="assets/Almar.png" alt="Almar" class="photo-placeholder">
            <h3>Almar</h3>
            <p>Support Head</p>
        </div>
    </div>

    <div class="org-connector"></div>

    <div class="team-grid">
        <div class="team-box">
            <h3>Cashout Team</h3>
            <ul>
                <li class="member-trigger" data-modal-target="arezModal" tabindex="0" role="button">
                    <img src="assets/Arez.png" alt="Arez" class="member-photo" data-modal-target="arezModal"> Arez
                </li>
                <li class="member-trigger" data-modal-target="jersonModal" tabindex="0" role="button">
                    <img src="assets/Jerson.png" alt="Jerson" class="member-photo" data-modal-target="jersonModal"> Jerson
                </li>
                <li class="member-trigger" data-modal-target="tristanModal" tabindex="0" role="button">
                    <img src="assets/Tristan.png" alt="Tristan" class="member-photo" data-modal-target="tristanModal"> Tristan
                </li>
            </ul>
        </div>

        <div class="team-box">
            <h3>Support Team</h3>
            <ul>
                <li class="member-trigger" data-modal-target="amoraModal" tabindex="0" role="button">
                    <img src="assets/amora.png" alt="Amora" class="member-photo" data-modal-target="amoraModal"> Amora
                </li>
                <li>
                    <a href="https://www.linkedin.com/in/arby-jann-benito-61360616b/" target="_blank">
                        <img src="assets/Arby.png" alt="Arby" class="member-photo">Arby
                    </a>
                </li>
                <li class="member-trigger" data-modal-target="fordModal" tabindex="0" role="button">
                    <img src="assets/Ford.png" alt="Ford" class="member-photo" data-modal-target="fordModal"> Ford
                </li>
                <li class="member-trigger" data-modal-target="genModal" tabindex="0" role="button">
                    <img src="assets/Gen.png" alt="Gen" class="member-photo" data-modal-target="genModal"> Gen
                </li>
                <li class="member-trigger" data-modal-target="jeanModal" tabindex="0" role="button">
                    <img src="assets/Jean.png" alt="Jean" class="member-photo" data-modal-target="jeanModal"> Jean
                </li>
            </ul>
        </div>
    </div>
</section>

    <div data-include="partials/modals-jean.html"></div>
