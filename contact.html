<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f6f8;
        margin: 0;
        padding: 0;
        color: #333;
    }

    header{
        background: linear-gradient(160deg,#f7f9f9,#67C090);
        padding: 20px 10%;
        display: flex;
        align-items: center;
        color: #fff;
    }

    header img.logo{
        width: 60px;
        height: 60px;
        object-fit: contain;
        cursor: pointer;
        margin-right: 20px;
    }

    header h1{
        font-size: 2rem;
    }

    main{
        max-width: 700px;
        margin: 50px auto;
        background: #fff;
        padding: 40px 30px;
        border-radius: 10px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    h2{
        margin-bottom: 20px;
        text-align: center;
    }

    form{
        display: flex;
        flex-direction: column;
    }

    form label{
        margin-bottom: 5px;
        font-weight: 600;
    }

    form input, form textarea{
        padding: 12px;
        margin-bottom: 20px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 1rem;
        width: 100%;
        box-sizing: border-box;
    }

    form button{
        padding: 14px;
        border: none;
        border-radius: 5px;
        background: #7bc28b;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        font-weight: 600;
    }

    form button:hover{
        background: #5aa06a;
    }

    .form-status{
        min-height: 24px;
        margin-top: 15px;
        text-align: center;
        font-weight: 600;
    }

    .form-status.success{
        color: #4d9a5d;
    }

    .form-status.error{
        color: #c0392b;
    }

    .back-link{
        text-align: center;
        margin-top: 30px;
    }

    .back-link a{
        color: #7bc28b;
        text-decoration: none;
        font-weight: 600;
    }

    .back-link a:hover{
        text-decoration: underline;
    }
</style>
</head>

<body>

<header>
    <img src="ES.png" alt="Eureka Logo" class="logo" style="cursor:pointer;" onclick="goToLanding()">
    <h1>Contact Us</h1>
</header>

<main>
    <h2>Get in Touch</h2>
    <form id="contactForm">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" placeholder="Your message" required></textarea>

        <button type="submit">Send Message</button>
        <div class="form-status" id="formStatus"></div>
    </form>

    <div class="back-link">
        <a href="index.html">&larr; Back to Landing Page</a>
    </div>
</main>

<script>
    const GOOGLE_SCRIPT_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";

    function goToLanding(){
        window.location.href = "index.html";
    }

    const form = document.getElementById("contactForm");
    const statusMessage = document.getElementById("formStatus");

    form.addEventListener("submit", async function(e){
        e.preventDefault();

        if (GOOGLE_SCRIPT_URL.includes("PASTE_YOUR")) {
            statusMessage.textContent = "Google Sheets connection is not set up yet.";
            statusMessage.className = "form-status error";
            return;
        }

        const submitButton = form.querySelector("button");
        submitButton.disabled = true;
        submitButton.textContent = "Sending...";
        statusMessage.textContent = "";
        statusMessage.className = "form-status";

        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: new FormData(form)
            });

            form.reset();
            statusMessage.textContent = "Message sent successfully.";
            statusMessage.className = "form-status success";
        } catch (error) {
            statusMessage.textContent = "Message could not be sent. Please try again.";
            statusMessage.className = "form-status error";
        } finally {
            submitButton.disabled = false;
            submitButton.textContent = "Send Message";
        }
    });
</script>

</body>
</html>
