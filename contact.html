<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<link
    rel="stylesheet"
    href="./styles/button-theme.css?v=1"
>

    <style>
    :root{
        --sl-navy:#241b5d;
        --sl-navy-deep:#1b1347;
        --sl-cream:#fbf8f1;
        --sl-cream-soft:#f4eee1;
        --sl-gold:#ffc21a;
        --sl-gold-soft:#ffe08a;
        --sl-text:#2b2459;
        --sl-muted:#6f678f;
        --sl-border:rgba(36,27,93,0.08);
        --sl-shadow:0 22px 50px rgba(36, 27, 93, 0.12);
    }

    *{
        box-sizing:border-box;
    }

    body{
        font-family:"Poppins",Arial,Helvetica,sans-serif;
        background:
            radial-gradient(circle at 12% 18%, rgba(255, 194, 26, 0.22), transparent 22rem),
            radial-gradient(circle at 86% 12%, rgba(36, 27, 93, 0.10), transparent 24rem),
            linear-gradient(180deg, var(--sl-cream) 0%, #fffdfa 48%, var(--sl-cream-soft) 100%);
        margin:0;
        padding:0;
        color:var(--sl-text);
        min-height:100vh;
        overflow-x:hidden;
    }

    body::before{
        content:"";
        position:fixed;
        inset:0;
        pointer-events:none;
        opacity:.16;
        background-image:
            linear-gradient(rgba(36,27,93,0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(36,27,93,0.05) 1px, transparent 1px);
        background-size:72px 72px,72px 72px;
        mask-image:linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0.24));
    }

    header{
        background:linear-gradient(180deg, rgba(255,255,255,0.96), rgba(248,243,233,0.96));
        padding:20px 10%;
        display:flex;
        align-items:center;
        gap:20px;
        color:var(--sl-text);
        border-bottom:1px solid var(--sl-border);
        box-shadow:0 10px 30px rgba(36,27,93,0.05);
        position:relative;
        z-index:1;
    }

    header img.logo{
        width:60px;
        height:60px;
        object-fit:contain;
        cursor:pointer;
        margin-right:0;
    }

    header h1{
        font-size:2rem;
        color:var(--sl-navy);
    }

    main{
        max-width:700px;
        margin:50px auto;
        background:linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,246,238,0.96));
        padding:40px 30px;
        border-radius:20px;
        border:1px solid var(--sl-border);
        box-shadow:var(--sl-shadow);
        position:relative;
        z-index:1;
    }

    h2{
        margin-bottom:20px;
        text-align:center;
        color:var(--sl-navy);
    }

    form{
        display:flex;
        flex-direction:column;
    }

    form label{
        margin-bottom:5px;
        font-weight:600;
        color:var(--sl-text);
    }

    form input, form textarea{
        padding:12px;
        margin-bottom:20px;
        border-radius:12px;
        border:1px solid var(--sl-border);
        font-size:1rem;
        width:100%;
        box-sizing:border-box;
        background:rgba(255,255,255,0.95);
        color:var(--sl-text);
        font-family:inherit;
    }

    form input:focus, form textarea:focus{
        outline:none;
        border-color:rgba(255,194,26,0.45);
        box-shadow:0 0 0 4px rgba(255,194,26,0.12);
    }

    form button{
        padding:14px;
        border:1px solid rgba(255,194,26,0.22);
        border-radius:12px;
        background:linear-gradient(135deg, var(--sl-gold), var(--sl-gold-soft));
        color:var(--sl-text);
        font-size:1rem;
        cursor:pointer;
        font-weight:600;
    }

    form button:hover{
        background:linear-gradient(135deg, #ffd54d, var(--sl-gold));
    }

    .form-status{
        min-height:24px;
        margin-top:15px;
        text-align:center;
        font-weight:600;
    }

    .form-status.success{
        color:var(--sl-navy);
    }

    .form-status.error{
        color:#9b5560;
    }

    .back-link{
        text-align:center;
        margin-top:30px;
    }

    .back-link a{
        color:var(--sl-navy);
        text-decoration:none;
        font-weight:600;
    }

    .back-link a:hover{
        text-decoration:underline;
        color:var(--sl-gold);
    }
</style>
</head>

<body>

<header>
    <img src="assets/ES.png" alt="Eureka Logo" class="logo" style="cursor:pointer;" onclick="goToLanding()">
    <h1>Contact Us</h1>
</header>

<main>
    <h2>Get in Touch</h2>
    <form id="contactForm">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Your name" required>

        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" placeholder="Your message" required></textarea>

        <button type="submit">Send Message</button>
        <div class="form-status" id="formStatus"></div>
    </form>

    <div class="back-link">
        <a href="index-modular.html">&larr; Back to Landing Page</a>
    </div>
</main>

<script>
    const GOOGLE_SCRIPT_URL = "PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE";

    function goToLanding(){
        window.location.href = "index-modular.html";
    }

    const form = document.getElementById("contactForm");
    const statusMessage = document.getElementById("formStatus");

    form.addEventListener("submit", async function(e){
        e.preventDefault();

        if (GOOGLE_SCRIPT_URL.includes("PASTE_YOUR")) {
            statusMessage.textContent = "Google Sheets connection is not set up yet.";
            statusMessage.className = "form-status error";
            return;
        }

        const submitButton = form.querySelector("button");
        submitButton.disabled = true;
        submitButton.textContent = "Sending...";
        statusMessage.textContent = "";
        statusMessage.className = "form-status";

        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: new FormData(form)
            });

            form.reset();
            statusMessage.textContent = "Message sent successfully.";
            statusMessage.className = "form-status success";
        } catch (error) {
            statusMessage.textContent = "Message could not be sent. Please try again.";
            statusMessage.className = "form-status error";
        } finally {
            submitButton.disabled = false;
            submitButton.textContent = "Send Message";
        }
    });
</script>

</body>
</html>
