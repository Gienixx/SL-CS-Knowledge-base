<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | SocialLoop CS Base</title>

  <link rel="stylesheet" href="./styles/button-theme.css?v=1" />
  <link rel="stylesheet" href="./styles/dashboard.css?v=2" />
  <link id="dashboardLiveStyles" rel="stylesheet" href="./styles/dashboard-live.css?v=5" />
  <link id="dashboardProductivityStyles" rel="stylesheet" href="./styles/dashboard-productivity.css?v=3" />
  <link id="dashboardDriverStyles" rel="stylesheet" href="./styles/dashboard-drivers.css?v=3" />
  <link id="dashboardDistributionStyles" rel="stylesheet" href="./styles/dashboard-distributions.css?v=3" />
  <link rel="stylesheet" href="./styles/dashboard-compact.css?v=1" />
  <link rel="stylesheet" href="./styles/dashboard-three-column.css?v=1" />
  <link rel="stylesheet" href="./styles/dashboard-footer-status.css?v=1" />
  <link rel="stylesheet" href="./styles/dashboard-data-consistency.css?v=1" />
  <link rel="stylesheet" href="./styles/dashboard-accessibility.css?v=1" />
  <link rel="stylesheet" href="./styles/dashboard-overflow-fixes.css?v=1" />
</head>
<body>
  <main class="page-shell">
    <header class="topbar">
      <div class="title-block">
        <h1>Customer Service &amp; Support Team Dashboard</h1>
        <p>Loading daily Google Sheet metrics...</p>
      </div>

      <nav class="top-actions" aria-label="Dashboard navigation">
        <a class="action-link" href="./home.html">Back to Home</a>
        <a class="action-link" href="./agent-analytics.html">Agent Analytics</a>
        <a class="action-link" href="./response-times.html">Response Times</a>
        <a id="reportingOperationsBtn" class="action-link" href="./reporting-operations.html" style="display:none;">Reporting Operations</a>
      </nav>
    </header>

    <section
      class="dashboard-board dashboard-loading-board"
      aria-label="Customer service dashboard"
      aria-live="polite"
      aria-busy="true"
    >
      <article class="dashboard-section dashboard-loading-section">
        <div class="section-tab">Dashboard</div>
        <div class="section-content dashboard-loading-content">
          <div class="dashboard-loading-state" role="status">
            <span class="dashboard-spinner" aria-hidden="true"></span>
            <h2>Loading dashboard</h2>
            <p>Verifying access and retrieving the latest Google Sheet snapshot.</p>
          </div>
        </div>
      </article>
    </section>

    <p class="footer-note">Loading Google Sheet daily snapshot...</p>
  </main>

  <script type="module" src="./scripts/dashboard.js?v=11"></script>
  <script type="module" src="./scripts/dashboard-latest-date.js?v=2"></script>
  <script type="module" src="./scripts/dashboard-drivers-loader.js?v=2"></script>
  <script type="module" src="./scripts/dashboard-concern-compat.js?v=5"></script>
  <script type="module" src="./scripts/dashboard-drilldowns.js?v=2"></script>
  <script type="module" src="./scripts/dashboard-accessibility.js?v=2"></script>
  <script type="module" src="./scripts/dashboard-data-consistency.js?v=1"></script>
  <script type="module" src="./scripts/dashboard-footer-status.js?v=1"></script>
</body>
</html>
