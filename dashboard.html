<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | SocialLoop CS Base</title>

  <link rel="stylesheet" href="./button-theme.css?v=1" />
  <link rel="stylesheet" href="./dashboard.css?v=1" />
  <link id="dashboardLiveStyles" rel="stylesheet" href="./dashboard-live.css?v=2" />
</head>
<body>
  <main class="page-shell">
    <header class="topbar">
      <div class="title-block">
        <h1>Customer Service &amp; Support Team Dashboard</h1>
        <p>Loading live support metrics...</p>
      </div>

      <nav class="top-actions" aria-label="Dashboard navigation">
        <a class="action-link" href="./index-modular.html">Back to Home</a>
        <a class="action-link" href="./KB.html">Knowledge Base</a>
        <a class="action-link" href="./org-chart.html">Organizational Chart</a>
        <a id="changePasswordBtn" class="action-link" href="./change-password.html" style="display:none;">Change Password</a>
        <a id="addArticleBtn" class="action-link" href="./add-article.html" style="display:none;">Article Management</a>
        <a id="userManagementBtn" class="action-link" href="./admin.html" style="display:none;">User Management</a>
        <a class="action-link" href="#" onclick="logout(); return false;">Logout</a>
      </nav>
    </header>

    <section
      class="dashboard-board dashboard-loading-board"
      aria-label="Customer service dashboard"
      aria-live="polite"
      aria-busy="true"
    >
      <article class="dashboard-section dashboard-loading-section">
        <div class="section-tab">Dashboard</div>
        <div class="section-content dashboard-loading-content">
          <div class="dashboard-loading-state" role="status">
            <span class="dashboard-spinner" aria-hidden="true"></span>
            <h2>Loading dashboard</h2>
            <p>Verifying access and retrieving the latest support metrics.</p>
          </div>
        </div>
      </article>
    </section>

    <p class="footer-note">Loading live data...</p>
  </main>

  <script type="module" src="./scripts/dashboard.js?v=5"></script>
</body>
</html>
