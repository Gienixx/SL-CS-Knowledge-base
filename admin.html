<!DOCTYPE html>
<html>
<head>
  <title>Admin Add User</title>
</head>

<body>

<div style="padding:20px;">
  <a
    href="./dashboard.html"
    style="
      display:inline-block;
      padding:10px 18px;
      border-radius:10px;
      background:#ffc21a;
      color:#241b5d;
      text-decoration:none;
      font-weight:700;
    "
  >
    ← Back to Dashboard
  </a>
</div>

<h1>Add User</h1>

<form id="addUserForm">

  <input
    type="email"
    id="email"
    placeholder="Email"
    required
  >

  <input
    type="password"
    id="password"
    placeholder="Password"
    required
  >

  <button type="submit">
    Add User
  </button>

</form>

  <hr>

<h1>Change User Password</h1>

<form id="changePasswordForm">
  <input
    type="email"
    id="changeEmail"
    placeholder="User email"
    required
  >

  <input
    type="password"
    id="newPassword"
    placeholder="New password"
    required
  >

  <button type="submit">
    Change Password
  </button>
</form>

<p id="changePasswordMessage"></p>
  
<p id="message"></p>

<script type="module" src="./scripts/admin.js"></script>

</body>
</html>
