<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>User Management | SocialLoop CS Base</title>

  <link
    rel="stylesheet"
    href="styles.css?v=modal-details-3"
  >

  <style>
    .admin-page {
      min-height: 100vh;
      padding: 40px 10%;
      background:
        radial-gradient(
          circle at 12% 18%,
          rgba(255, 194, 26, 0.20),
          transparent 22rem
        ),
        radial-gradient(
          circle at 86% 12%,
          rgba(36, 27, 93, 0.10),
          transparent 24rem
        ),
        linear-gradient(
          180deg,
          var(--sl-cream) 0%,
          #fffdfa 48%,
          var(--sl-cream-soft) 100%
        );
    }

    .admin-shell {
      max-width: 980px;
      margin: 0 auto;
    }

    .admin-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .admin-title h1 {
      color: var(--sl-navy);
      font-size: clamp(2rem, 4vw, 3rem);
      margin-bottom: 8px;
    }

    .admin-title p {
      color: var(--sl-muted);
      line-height: 1.6;
    }

    .admin-card {
      background:
        linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.96),
          rgba(250, 246, 238, 0.98)
        );

      border: 1px solid var(--sl-border);
      border-radius: 22px;
      box-shadow: var(--sl-shadow);
      padding: 28px;
      margin-bottom: 22px;
    }

    .admin-card h2 {
      color: var(--sl-navy);
      margin-bottom: 18px;
    }

    .admin-card-description {
      color: var(--sl-muted);
      line-height: 1.6;
      margin-top: -8px;
      margin-bottom: 18px;
    }

    .admin-form {
      display: grid;
      gap: 14px;
    }

    .admin-form input:not([type="checkbox"]),
    .admin-form textarea {
      width: 100%;
      border: 1px solid var(--sl-border);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      color: var(--sl-text);
      background: rgba(255, 255, 255, 0.9);
      outline: none;
    }

    .admin-form input:not([type="checkbox"]):focus,
    .admin-form textarea:focus {
      border-color: rgba(255, 194, 26, 0.7);
      box-shadow:
        0 0 0 4px rgba(255, 194, 26, 0.14);
    }

    .admin-checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--sl-text);
      font-weight: 600;
      cursor: pointer;
    }

    .admin-checkbox input {
      width: 18px;
      height: 18px;
      accent-color: var(--sl-navy);
      cursor: pointer;
    }

    .admin-permissions {
      display: grid;
      gap: 10px;
      padding: 8px 0;
    }

    .admin-permissions[hidden] {
      display: none;
    }

    .admin-btn,
    .admin-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 18px;
      border-radius: 999px;
      border:
        1px solid rgba(255, 194, 26, 0.55);
      background: var(--sl-navy);
      color: #fff;
      text-decoration: none;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    .admin-link {
      background: rgba(255, 255, 255, 0.88);
      color: var(--sl-navy);
    }

    .admin-btn:hover:not(:disabled),
    .admin-link:hover {
      transform: translateY(-1px);
    }

    .admin-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .admin-status {
      margin-top: 12px;
      color: var(--sl-muted);
      font-weight: 600;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    @media (max-width: 700px) {
      .admin-page {
        padding: 24px 16px;
      }

      .admin-card {
        padding: 20px;
      }

      .admin-btn,
      .admin-link {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="admin-page">
    <div class="admin-shell">
      <header class="admin-topbar">
        <div class="admin-title">
          <h1>User Management</h1>

          <p>
            Add users, edit account permissions,
            and manage passwords for SocialLoop CS Base.
          </p>
        </div>

        <a
          class="admin-link"
          href="./dashboard.html"
        >
          ← Back to Dashboard
        </a>
      </header>

      <section
        id="addUserSection"
        class="admin-card"
      >
        <h2>Add User</h2>

        <form
          id="addUserForm"
          class="admin-form"
        >
          <input
            type="text"
            id="name"
            name="name"
            placeholder="User name"
            autocomplete="name"
            required
          >

          <input
            type="email"
            id="email"
            name="email"
            placeholder="User email"
            autocomplete="email"
            required
          >

          <input
            type="password"
            id="password"
            name="password"
            placeholder="Temporary password"
            autocomplete="new-password"
            minlength="8"
            required
          >

          <div class="admin-permissions">
            <label class="admin-checkbox">
              <input
                type="checkbox"
                id="isAdmin"
                name="isAdmin"
              >

              <span>Administrator account</span>
            </label>

            <label class="admin-checkbox">
              <input
                type="checkbox"
                id="canEditArticles"
                name="canEditArticles"
              >

              <span>Editor access</span>
            </label>
          </div>

          <button
            class="admin-btn"
            type="submit"
          >
            Add User
          </button>
        </form>

        <p
          id="message"
          class="admin-status"
          aria-live="polite"
        ></p>
      </section>

      <section class="admin-card">
        <h2>Edit User Access</h2>

        <p class="admin-card-description">
          Enter a user's email address to load and
          update their current administrator and editor permissions.
        </p>

        <form
          id="editUserForm"
          class="admin-form"
        >
          <input
            type="email"
            id="editUserEmail"
            name="editUserEmail"
            placeholder="User email"
            autocomplete="email"
            required
          >

          <button
            class="admin-btn"
            id="loadUserSettingsBtn"
            type="button"
          >
            Load Current Settings
          </button>

          <div
            id="editUserPermissions"
            class="admin-permissions"
            hidden
          >
            <label class="admin-checkbox">
              <input
                type="checkbox"
                id="editIsAdmin"
                name="editIsAdmin"
              >

              <span>Administrator account</span>
            </label>

            <label class="admin-checkbox">
              <input
                type="checkbox"
                id="editCanEditArticles"
                name="editCanEditArticles"
              >

              <span>Editor access</span>
            </label>

            <button
              class="admin-btn"
              type="submit"
            >
              Save Settings
            </button>
          </div>
        </form>

        <p
          id="editUserMessage"
          class="admin-status"
          aria-live="polite"
        ></p>
      </section>

      <section class="admin-card">
        <h2>Change Password</h2>

        <form
          id="changePasswordForm"
          class="admin-form"
        >
          <input
            type="email"
            id="changeEmail"
            name="changeEmail"
            placeholder="User email"
            autocomplete="email"
            required
          >

          <input
            type="password"
            id="newPassword"
            name="newPassword"
            placeholder="New password"
            autocomplete="new-password"
            minlength="8"
            required
          >

          <button
            class="admin-btn"
            type="submit"
          >
            Change Password
          </button>
        </form>

        <p
          id="changePasswordMessage"
          class="admin-status"
          aria-live="polite"
        ></p>
      </section>
    </div>
  </main>

  <script
    type="module"
    src="./scripts/admin.js?v=4"
  ></script>
</body>
</html>
