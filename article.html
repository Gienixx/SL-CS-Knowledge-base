<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Article — Knowledge base</title>
<link rel="preconnect" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1B2340;--ink-soft:#2B3560;--paper:#F7F5EF;--card:#FFFFFF;--line:#E7E3D8;--amber:#C9812E;--amber-bg:#FBEDDA;--amber-strong:#E2A83D;--teal:#2E7D6B;--teal-bg:#E4F1EC;--coral:#B5432F;--coral-bg:#FBEAE5;--violet:#4C4A9E;--violet-bg:#EAEAF7;--text-1:#1B2340;--text-2:#6B7280;--text-3:#9A9788;--text:var(--text-1);--muted:var(--text-2)}
  *{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--paper);color:var(--text-1);font-family:'Inter',sans-serif}.wrap{max-width:1120px;margin:0 auto;padding:0 32px 70px}
  header{display:flex;justify-content:space-between;align-items:center;padding:26px 0 22px}.brand{display:flex;align-items:center;gap:10px;color:inherit;text-decoration:none}.brand-mark{width:32px;height:32px;border-radius:9px;background:var(--amber-strong);display:flex;align-items:center;justify-content:center;font:700 15px 'Space Grotesk',sans-serif;color:var(--ink)}.brand-name{font:600 14.5px 'Space Grotesk',sans-serif}.nav-actions{display:flex;gap:8px;align-items:center}.back-btn,.article-management-return-link{font:600 13px 'Inter',sans-serif;color:var(--ink);background:var(--card);border:1px solid var(--line);padding:9px 16px;border-radius:100px;cursor:pointer;text-decoration:none;white-space:nowrap}.back-btn:hover,.article-management-return-link:hover{border-color:var(--ink)}
  .crumbs{font-size:12.5px;color:var(--text-3);margin-bottom:14px}.crumbs a{color:var(--text-3);text-decoration:none}.crumbs a:hover{color:var(--ink)}.crumbs .sep{margin:0 6px}.crumbs .cur{color:var(--text-2)}.art-tag{display:inline-block;font-size:11px;font-weight:600;padding:4px 10px;border-radius:100px;background:var(--violet-bg);color:var(--violet);margin-bottom:14px}.art-tag.cashouts{background:var(--teal-bg);color:var(--teal)}.art-h1{font:700 30px/1.2 'Space Grotesk',sans-serif;letter-spacing:-.5px;margin:0 0 16px;max-width:680px}.byline{display:flex;align-items:center;gap:10px;margin-bottom:34px}.avatar{width:32px;height:32px;border-radius:50%;background:var(--amber-strong);color:var(--ink);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.byline-text{font-size:12.5px;color:var(--text-2);line-height:1.5}.byline-text b{color:var(--text-1);font-weight:600}.published-article-update-status{display:inline;color:inherit;font:inherit}.article-cover{display:block;width:min(680px,100%);max-height:390px;object-fit:cover;border-radius:14px;border:1px solid var(--line);margin:-10px 0 34px}
  .layout{display:grid;grid-template-columns:minmax(0,1fr) 260px;gap:48px;align-items:start}.article-body{max-width:680px;font-size:15px;line-height:1.75;color:var(--text-1)}.article-body .section,.article-body .step-card,.article-body .callout-card,.article-body .table-card{margin:0 0 28px;padding:0;background:transparent;border:0;box-shadow:none;border-radius:0;overflow:visible}.article-body h2,.article-body .section-title,.article-body .step-title,.article-body .table-title,.article-body .callout-card-title{font:600 19px 'Space Grotesk',sans-serif;color:var(--text-1);margin:36px 0 12px;letter-spacing:-.2px}.article-body> :first-child h2,.article-body>h2:first-child{margin-top:0}.article-body h3{font:600 16px 'Space Grotesk',sans-serif;margin:24px 0 10px}.article-body p{margin:0 0 16px;color:var(--text-1)}.article-body ul,.article-body ol{margin:0 0 16px;padding-left:22px}.article-body li{margin-bottom:8px}.article-body .callout-card{background:var(--teal-bg);border-radius:12px;padding:16px 18px;margin:20px 0;font-size:13.5px;color:var(--teal);line-height:1.6}.article-body .callout-card-title{color:var(--teal);font:700 13.5px 'Inter',sans-serif;margin:0 0 5px}.article-body table{width:100%;border-collapse:collapse;margin:16px 0}.article-body th,.article-body td{padding:11px 12px;border:1px solid var(--line);text-align:left;vertical-align:top}.article-body th{background:var(--amber-bg);font-size:13px}.article-body img{max-width:100%;height:auto;border-radius:10px}.divider{height:1px;background:var(--line);margin:32px 0}.feedback{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 20px;margin-top:36px;flex-wrap:wrap;gap:12px}.feedback-q{font-size:13.5px;font-weight:600}.feedback-btns{display:flex;gap:8px}.feedback-btns button{font:600 13px 'Inter',sans-serif;color:var(--ink);background:var(--paper);border:1px solid var(--line);padding:8px 16px;border-radius:100px;cursor:pointer}.feedback-btns button:hover,.feedback-btns button.selected{border-color:var(--ink);background:var(--ink);color:#fff}
  aside{position:sticky;top:24px}.side-box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:16px}.side-title{font-size:11px;letter-spacing:.7px;text-transform:uppercase;color:var(--text-3);font-weight:600;margin:0 0 12px}.toc a{display:block;font-size:13px;color:var(--text-2);text-decoration:none;padding:6px 0 6px 10px;border-left:2px solid transparent;margin-left:-11px}.toc a:hover{color:var(--ink)}.toc a.active{color:var(--ink);font-weight:600;border-left-color:var(--amber-strong)}.related-item{padding:10px 0;border-top:1px solid var(--line)}.related-item:first-child{border-top:none;padding-top:0}.related-item a{font-size:13px;font-weight:600;color:var(--text-1);text-decoration:none;line-height:1.4;display:block;margin-bottom:3px}.related-item a:hover{color:var(--violet)}.related-item span{font-size:11.5px;color:var(--text-3)}.loading-section,.error-section{max-width:680px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:24px;color:var(--text-2)}[hidden]{display:none!important}
  @media(max-width:880px){.layout{grid-template-columns:1fr}.article-body{max-width:none}aside{position:static;display:grid;grid-template-columns:1fr 1fr;gap:16px}.article-cover{width:100%}}
  @media(max-width:600px){.wrap{padding:0 18px 48px}.nav-actions{align-items:flex-end;flex-direction:column}.back-btn,.article-management-return-link{padding:7px 12px;font-size:11.5px}.art-h1{font-size:26px}.byline{align-items:flex-start}aside{display:block}.section-head{display:block}.article-body th,.article-body td{padding:8px;font-size:12px}}
</style>
</head>
<body><div class="wrap">
  <header><a class="brand" href="./KB.html"><span class="brand-mark">S</span><span class="brand-name">Knowledge base</span></a><div class="nav-actions nav-shell"><a href="./KB.html" class="back-btn">Back to Knowledge Base</a></div></header>
  <main>
    <div class="crumbs"><a href="./KB.html">Knowledge base</a><span class="sep">/</span><a id="categoryCrumb" href="./KB.html">Article</a><span class="sep">/</span><span class="cur" id="currentCrumb">Loading…</span></div>
    <span class="art-tag" id="articleTag">Article</span><h1 class="art-h1" id="articleTitle">Loading article…</h1>
    <div class="byline article-head"><div class="avatar" id="articleAvatar">S</div><div class="byline-text meta" id="articleByline">Loading article details…</div></div>
    <img id="articleCover" class="article-cover" alt="" hidden>
    <section id="loadingSection" class="loading-section"><p>Loading article content…</p></section>
    <section id="errorSection" class="error-section" hidden><h2>Article unavailable</h2><p id="articleError"></p></section>
    <div class="layout" id="contentGrid" hidden>
      <div><p id="articleDek" class="article-body"></p><article id="articleBody" class="article-body"></article><div class="divider"></div><div class="feedback"><span class="feedback-q">Was this article helpful?</span><div class="feedback-btns"><button type="button" data-answer="yes">Yes</button><button type="button" data-answer="no">No</button></div></div></div>
      <aside><div class="side-box"><p class="side-title">On this page</p><nav class="toc" id="tocLinks" aria-label="On this page"></nav></div><div class="side-box"><p class="side-title">Related articles</p><div id="relatedArticles"><span class="watch-sub">Loading related articles…</span></div></div></aside>
    </div>
    <p id="footerNote" hidden></p><span id="articleDate" hidden></span><span id="articleAuthor" hidden></span><span id="ghostTitle" hidden></span>
  </main>
</div>
<script type="module" src="./scripts/article.js?v=6"></script><script type="module" src="./scripts/auth-guard.js"></script>
</body></html>
