<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Article | SocialLoop CS Base</title>

  <style>
    :root {
      --bg: #fbf8f1;
      --bg-deep: #f4eee1;
      --panel: rgba(255, 255, 255, 0.94);
      --line: rgba(36, 27, 93, 0.08);
      --text: #2b2459;
      --muted: #6f678f;
      --subtle: #8b84a8;
      --cyan: #241b5d;
      --cyan-soft: rgba(255, 194, 26, 0.12);
      --gold: #ffc21a;
      --radius: 18px;
      --shadow: 0 28px 80px rgba(36, 27, 93, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text);
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      letter-spacing: 0.01em;
      background:
        radial-gradient(
          circle at 78% -5%,
          rgba(255, 194, 26, 0.30),
          transparent 32rem
        ),
        radial-gradient(
          circle at 22% 12%,
          rgba(36, 27, 93, 0.08),
          transparent 24rem
        ),
        linear-gradient(
          180deg,
          var(--bg) 0%,
          var(--bg-deep) 100%
        );
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.16;
      background-image:
        linear-gradient(
          rgba(36, 27, 93, 0.05) 1px,
          transparent 1px
        ),
        linear-gradient(
          90deg,
          rgba(36, 27, 93, 0.05) 1px,
          transparent 1px
        ),
        radial-gradient(
          rgba(36, 27, 93, 0.08) 0.7px,
          transparent 0.8px
        );
      background-size:
        72px 72px,
        72px 72px,
        3px 3px;
      mask-image:
        linear-gradient(
          to bottom,
          rgba(0, 0, 0, 1),
          rgba(0, 0, 0, 0.18)
        );
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(18px);
    }

    .nav-shell {
      width: min(1180px, calc(100% - 44px));
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      color: var(--text);
      text-decoration: none;
      font-weight: 850;
      letter-spacing: 0.17em;
      font-size: 1.02rem;
      text-transform: uppercase;
    }

    .page {
      width: min(1180px, calc(100% - 44px));
      margin: 0 auto;
      padding: 78px 0 110px;
    }

    .hero-frame {
      position: relative;
      min-height: 426px;
      border: 1px solid var(--line);
      border-right: none;
      padding: 78px 0 48px;
      margin-left: -4px;
      background:
        linear-gradient(
          90deg,
          rgba(255, 255, 255, 0.88),
          rgba(244, 238, 225, 0.24) 62%,
          transparent
        );
    }

    .ghost-title {
      position: absolute;
      top: 66px;
      left: 42px;
      max-width: 880px;
      font-size: clamp(3.4rem, 7.5vw, 6.35rem);
      line-height: 0.92;
      letter-spacing: 0.045em;
      color: rgba(36, 27, 93, 0.06);
      font-weight: 300;
      white-space: pre-line;
      pointer-events: none;
    }

    .article-head {
      position: relative;
      z-index: 2;
      width: min(760px, 100%);
      margin-left: 430px;
      padding-right: 34px;
    }

    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.92rem;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 34px;
    }

    .back-link:hover {
      color: var(--cyan);
    }

    h1 {
      margin: 0 0 18px;
      max-width: 760px;
      color: var(--text);
      font-size: clamp(2.3rem, 4.3vw, 4.15rem);
      line-height: 1.15;
      letter-spacing: 0.035em;
      font-weight: 860;
      text-shadow:
        0 0 24px rgba(255, 194, 26, 0.14);
    }

    .meta {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.96rem;
      margin-bottom: 40px;
    }

    .date-badge {
      color: var(--cyan);
      border: 1px solid rgba(255, 194, 26, 0.28);
      background: rgba(255, 194, 26, 0.12);
      border-radius: 8px;
      padding: 7px 13px;
      font-weight: 700;
      box-shadow:
        inset 0 0 22px rgba(255, 194, 26, 0.06);
    }

    .dek {
      margin: 0;
      max-width: 740px;
      color: var(--text);
      font-size: clamp(1.65rem, 2.95vw, 3.2rem);
      line-height: 1.1;
      letter-spacing: 0.02em;
      font-weight: 840;
    }

    .content-grid {
      display: grid;
      grid-template-columns: 260px minmax(0, 760px);
      gap: 58px;
      justify-content: end;
      align-items: start;
      margin-top: 72px;
    }

    .toc {
      position: sticky;
      top: 86px;
      align-self: start;
      padding: 24px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
    }

    .toc-title {
      color: var(--text);
      margin: 0 0 14px;
      text-transform: uppercase;
      font-size: 0.76rem;
      letter-spacing: 0.16em;
      font-weight: 800;
    }

    .toc a {
      display: block;
      color: var(--muted);
      text-decoration: none;
      padding: 9px 0;
      font-size: 0.9rem;
      line-height: 1.35;
      border-bottom: 1px solid var(--line);
    }

    .toc a:last-child {
      border-bottom: none;
    }

    .toc a:hover {
      color: var(--cyan);
    }

    .article-body {
      padding-bottom: 80px;
    }

    .section {
      position: relative;
      margin-bottom: 38px;
      padding: 34px 36px;
      border: 1px solid var(--line);
      background:
        linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.96),
          rgba(250, 246, 238, 0.96)
        );
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      scroll-margin-top: 90px;
    }

    .section::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 1px;
      background:
        linear-gradient(
          90deg,
          transparent,
          rgba(255, 194, 26, 0.58),
          transparent
        );
      opacity: 0.7;
    }

    .section::after {
      content: "";
      position: absolute;
      width: 190px;
      height: 190px;
      right: -95px;
      top: -95px;
      border-radius: 50%;
      background:
        radial-gradient(
          circle,
          rgba(255, 194, 26, 0.11),
          transparent 62%
        );
      pointer-events: none;
    }

    h2,
    h3 {
      position: relative;
      margin-top: 0;
      color: var(--text);
    }

    h2 {
      margin-bottom: 18px;
      font-size: clamp(1.45rem, 2vw, 2.1rem);
      line-height: 1.15;
      letter-spacing: 0.02em;
    }

    h3 {
      margin-bottom: 12px;
      color: var(--cyan);
      font-size: 1.08rem;
      line-height: 1.35;
    }

    .section p,
    .section li {
      position: relative;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.78;
    }

    .section p {
      margin: 0 0 16px;
    }

    .section strong {
      color: var(--text);
      font-weight: 800;
    }

    .section ul,
    .section ol {
      position: relative;
      padding-left: 1.3rem;
      margin: 14px 0 18px;
    }

    .section li {
      margin-bottom: 9px;
    }

    .callout {
      position: relative;
      padding: 24px;
      margin: 22px 0;
      color: var(--text);
      line-height: 1.65;
      border-radius: 15px;
      border: 1px solid rgba(255, 194, 26, 0.24);
      background:
        linear-gradient(
          135deg,
          rgba(255, 194, 26, 0.12),
          rgba(255, 255, 255, 0.9)
        );
    }

    .loading-section,
    .error-section {
      width: min(760px, 100%);
      margin: 72px 0 0 auto;
      padding: 34px 36px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .loading-section p,
    .error-section p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .error-section h2 {
      margin-bottom: 12px;
    }

    .footer-note {
      color: var(--subtle);
      text-align: center;
      padding: 36px 0 0;
      font-size: 0.88rem;
    }

    @media (max-width: 850px) {
      .hero-frame {
        border-right: 1px solid var(--line);
        padding: 54px 18px 34px;
      }

      .ghost-title {
        display: none;
      }

      .article-head {
        margin-left: 0;
        padding-right: 0;
      }

      .content-grid {
        display: block;
        margin-top: 44px;
      }

      .toc {
        position: relative;
        top: 0;
        margin-bottom: 24px;
      }

      .section {
        padding: 28px 24px;
      }

      .loading-section,
      .error-section {
        margin-left: 0;
      }
    }

    @media (max-width: 520px) {
      .page,
      .nav-shell {
        width: min(100% - 28px, 1180px);
      }

      .brand {
        font-size: 0.98rem;
      }

      h1 {
        font-size: 2.18rem;
      }

      .dek {
        font-size: 1.55rem;
      }

      .section {
        padding: 24px 18px;
      }

      .loading-section,
      .error-section {
        padding: 26px 20px;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="nav-shell">
      <a
        class="brand"
        href="./index-modular.html"
        aria-label="Support Knowledge Base Home"
      >
        Support KB
      </a>
    </div>
  </header>

  <main class="page">
    <section
      class="hero-frame"
      aria-labelledby="articleTitle"
    >
      <div
        id="ghostTitle"
        class="ghost-title"
      >
        Support
        Article
      </div>

      <div class="article-head">
        <a
          class="back-link"
          href="./KB.html"
        >
          ← Back to Knowledge Base
        </a>

        <h1 id="articleTitle">
          Loading article...
        </h1>

        <div class="meta">
          <span
            id="articleDate"
            class="date-badge"
          >
            Loading
          </span>

          <span id="articleAuthor"></span>
        </div>

        <p
          id="articleDek"
          class="dek"
        ></p>
      </div>
    </section>

    <section
      id="loadingSection"
      class="loading-section"
    >
      <p>Loading article content...</p>
    </section>

    <section
      id="errorSection"
      class="error-section"
      hidden
    >
      <h2>Article unavailable</h2>
      <p id="articleError"></p>
    </section>

    <div
      id="contentGrid"
      class="content-grid"
      hidden
    >
      <aside
        class="toc"
        aria-label="Table of contents"
      >
        <p class="toc-title">Article Map</p>
        <div id="tocLinks"></div>
      </aside>

      <article
        id="articleBody"
        class="article-body"
      ></article>
    </div>

    <p
      id="footerNote"
      class="footer-note"
      hidden
    >
      SocialLoop Customer Support Knowledge Base
    </p>
  </main>

  <script
    type="module"
    src="./scripts/article.js?v=3"
  ></script>

  <script
    type="module"
    src="./scripts/auth-guard.js"
  ></script>
</body>
</html>
